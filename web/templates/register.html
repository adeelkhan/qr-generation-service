{{template "layout.html" .}}
{{define "content"}}
<div class="auth-container">
  <div class="auth-card">
    <h2>Create account</h2>
    <p class="subtitle">Get started for free</p>
    <div id="error-msg" class="error-msg hidden"></div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="your_username">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>
    <button class="btn btn-primary btn-full" onclick="doRegister()">Create Account</button>
    <p class="auth-link">Have an account? <a href="/login">Sign in</a></p>
  </div>
</div>
<script>
async function doRegister() {
  const username = document.getElementById('username').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const res = await fetch('/api/v1/auth/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, email, password })
  });
  const data = await res.json();
  if (!res.ok) {
    document.getElementById('error-msg').textContent = data.error || 'Registration failed';
    document.getElementById('error-msg').classList.remove('hidden');
    return;
  }
  window.location.href = '/login';
}
</script>
{{end}}
