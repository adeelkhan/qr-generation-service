{{define "register.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QRGen — Register</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  {{template "nav" .}}
  <div class="auth-container">
    <div class="auth-card">
      <h2>Create account</h2>
      <p class="subtitle">Get started for free</p>
      <div id="error-msg" class="error-msg hidden"></div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="your_username">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••">
      </div>
      <button class="btn btn-primary btn-full" onclick="doRegister()">Create Account</button>
      <p class="auth-link">Have an account? <a href="/login">Sign in</a></p>
    </div>
  </div>
  <script>
  async function doRegister() {
    const username = document.getElementById('username').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const res = await fetch('/api/v1/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, password })
    });
    const data = await res.json();
    if (!res.ok) {
      let msg = 'Something went wrong. Please try again.';
      if (res.status === 409) msg = 'Username or email is already taken.';
      else if (res.status === 400) msg = 'Please fill in all fields. Username must be at least 3 characters, password at least 6.';
      document.getElementById('error-msg').textContent = msg;
      document.getElementById('error-msg').classList.remove('hidden');
      return;
    }
    window.location.href = '/login';
  }
  </script>
</body>
</html>
{{end}}
